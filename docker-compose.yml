services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polyflow
      POSTGRES_PASSWORD: polyflow
      POSTGRES_DB: polyflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    command: ["api"]
    env_file: .env
    environment:
      POLYFLOW_DATABASE_URL: postgresql+asyncpg://polyflow:polyflow@postgres:5432/polyflow
      POLYFLOW_REDIS_URL: redis://redis:6379/0
      POLYFLOW_RUN_WORKER_IN_API: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["worker"]
    env_file: .env
    environment:
      POLYFLOW_DATABASE_URL: postgresql+asyncpg://polyflow:polyflow@postgres:5432/polyflow
      POLYFLOW_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
