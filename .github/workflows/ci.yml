name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q
        env:
          # Tests run fully offline against fixtures + SQLite + in-memory cache.
          POLYFLOW_USE_FIXTURES: "true"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: polyflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run --rm \
            -e POLYFLOW_USE_FIXTURES=true \
            -e POLYFLOW_DATABASE_URL=sqlite+aiosqlite:///./ci.db \
            polyflow:ci python -m app.worker.run --once
